<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devlogs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
    }

    header {
      padding: 40px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      background: #151922;
      border-bottom: 1px solid #2a2f3a;
    }

    #container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #161b22;
      border: 1px solid #2a2f3a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
    }

    .section {
      margin-top: 15px;
    }

    .section h3 {
      margin: 10px 0 5px;
      font-size: 15px;
      color: #9ecbff;
      border-bottom: 1px solid #2a2f3a;
      padding-bottom: 4px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .loading {
      text-align: center;
      padding: 50px;
      opacity: 0.7;
    }

    .error {
      background: #2a1111;
      border: 1px solid #ff4d4d;
      padding: 15px;
      border-radius: 8px;
      color: #ffb3b3;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <header>Devlogs</header>

  <div id="container">
    <div class="loading" id="loading">Loading devlogs...</div>
  </div>

  <script src="Devlog.js"></script>
</body>
</html>
