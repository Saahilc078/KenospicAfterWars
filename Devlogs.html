<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devlogs Debug</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
    }

    header {
      padding: 30px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      background: #151922;
      border-bottom: 1px solid #2a2f3a;
    }

    #container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #161b22;
      border: 1px solid #2a2f3a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .error {
      background: #2a1111;
      border: 1px solid #ff4d4d;
      padding: 15px;
      border-radius: 8px;
      color: #ffb3b3;
      white-space: pre-wrap;
    }

    .loading {
      text-align: center;
      opacity: 0.7;
      padding: 40px;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <header>Devlogs Debug Mode</header>

  <div id="container">
    <div class="loading" id="loading">Loading devlogs...</div>
  </div>

  <script>
    async function loadDevlogs() {
      const container = document.getElementById("container");
      const loading = document.getElementById("loading");

      try {
        console.log("Fetching /api/devlogs...");

        const res = await fetch("/api/devlogs");

        console.log("Response status:", res.status);
        console.log("Response ok:", res.ok);

        const text = await res.text();

        console.log("Raw response:", text);

        // If not OK, show real server error
        if (!res.ok) {
          loading.remove();
          container.innerHTML = `
            <div class="error">
              <b>HTTP Error:</b> ${res.status}<br><br>
              <b>Server response:</b><br>
              ${text}
            </div>
          `;
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          loading.remove();
          container.innerHTML = `
            <div class="error">
              <b>JSON Parse Error</b><br><br>
              The API did not return valid JSON.<br><br>
              <b>Raw output:</b><br>
              ${text}
            </div>
          `;
          return;
        }

        loading.remove();

        if (!Array.isArray(data)) {
          container.innerHTML = `
            <div class="error">
              API returned invalid structure (not an array).<br><br>
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
          return;
        }

        if (data.length === 0) {
          container.innerHTML = `<div class="small">No devlogs found.</div>`;
          return;
        }

        data.forEach(post => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <b>${post.title || "Untitled"}</b><br>
            <div class="small">
              ${post.author || "unknown"} • ${post.date || "no date"}
            </div>
            <br>
            <div>${post.content || ""}</div>
          `;

          container.appendChild(card);
        });

      } catch (err) {
        console.error("Fetch failed:", err);

        loading.remove();
        container.innerHTML = `
          <div class="error">
            <b>Fetch Failed (Network / Function not running)</b><br><br>
            ${err.stack || err}
          </div>
        `;
      }
    }

    loadDevlogs();
  </script>
</body>
</html>
