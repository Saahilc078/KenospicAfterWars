<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devlogs – KenospicAfterWars</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      min-height: 100vh;
    }

    header {
      padding: 40px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      background: #151922;
      border-bottom: 1px solid #2a2f3a;
      letter-spacing: 3px;
    }

    #container {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 20px;
    }

    /* ── Card ── */
    .card {
      background: #161b22;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #4a5568; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid #2a2f3a;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #2a2f3a;
      flex-shrink: 0;
    }

    .avatar-placeholder {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #2a2f3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .post-title {
      font-size: 17px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 3px;
    }

    .meta {
      font-size: 12px;
      color: #8b949e;
    }

    /* ── Body ── */
    .card-body {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .content {
      line-height: 1.7;
      color: #c9d1d9;
    }

    .content p { margin-bottom: 8px; }
    .content p:last-child { margin-bottom: 0; }

    .content ul {
      margin: 6px 0 10px 20px;
      list-style: disc;
    }
    .content li { margin-bottom: 4px; }

    .content h3 {
      font-size: 13px;
      font-weight: bold;
      color: #9ecbff;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #2a2f3a;
      padding-bottom: 4px;
      margin: 14px 0 8px;
    }

    /* ── Media grid ── */
    .media-grid {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }

    .media-grid.single {
      grid-template-columns: 1fr;
    }

    .media-item {
      border-radius: 8px;
      overflow: hidden;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .media-item img:hover { opacity: 0.85; }

    .media-grid.single .media-item img {
      height: auto;
      max-height: 520px;
      object-fit: contain;
    }

    .media-item video {
      width: 100%;
      max-height: 480px;
      display: block;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 6px;
    }

    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 22px;
      font-size: 30px;
      color: #fff;
      cursor: pointer;
      opacity: 0.7;
      line-height: 1;
    }
    #lightbox-close:hover { opacity: 1; }

    /* ── States ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: #8b949e;
    }
    .loading::after {
      content: '';
      display: block;
      width: 30px;
      height: 30px;
      border: 3px solid #2a2f3a;
      border-top-color: #9ecbff;
      border-radius: 50%;
      margin: 14px auto 0;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #2a1111;
      border: 1px solid #ff4d4d;
      padding: 16px;
      border-radius: 8px;
      color: #ffb3b3;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .empty {
      text-align: center;
      padding: 60px;
      color: #8b949e;
    }
  </style>
</head>

<body>
  <header>Devlogs</header>

  <div id="container">
    <div class="loading" id="loading">Loading devlogs</div>
  </div>

  <div id="lightbox">
    <span id="lightbox-close">✕</span>
    <img id="lightbox-img" src="" alt=""/>
  </div>

  <script>
    // Lightbox
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    document.getElementById("lightbox-close").onclick = closeLightbox;
    lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
    function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add("open"); }
    function closeLightbox() { lightbox.classList.remove("open"); lightboxImg.src = ""; }

    // Main
    async function loadDevlogs() {
      const container = document.getElementById("container");
      const loading = document.getElementById("loading");

      try {
        const res = await fetch("/api/devlogs", { cache: "no-store" });
        const text = await res.text();
        loading?.remove();

        if (!res.ok) {
          container.innerHTML = `<pre class="error">${escapeHtml(text)}</pre>`;
          return;
        }

        let posts;
        try { posts = JSON.parse(text); }
        catch {
          container.innerHTML = `<pre class="error">Failed to parse response:\n${escapeHtml(text)}</pre>`;
          return;
        }

        if (!posts.length) {
          container.innerHTML = `<div class="empty">No devlogs found.</div>`;
          return;
        }

        container.innerHTML = "";

        posts.forEach(post => {
          const card = document.createElement("div");
          card.className = "card";

          const avatarHtml = post.avatar
            ? `<img class="avatar" src="${escapeHtml(post.avatar)}" alt="${escapeHtml(post.author)}"
                onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>📋</div>'">`
            : `<div class="avatar-placeholder">📋</div>`;

          const dateStr = new Date(post.date + "T12:00:00Z").toLocaleDateString("en-AU", {
            year: "numeric", month: "long", day: "numeric"
          });

          // Split attachments into images and videos
          const images = post.attachments.filter(a =>
            a.type.startsWith("image/") || /\.(png|jpg|jpeg|gif|webp)$/i.test(a.name)
          );
          const videos = post.attachments.filter(a =>
            a.type.startsWith("video/") || /\.(mp4|mov|webm)$/i.test(a.name)
          );

          const totalMedia = images.length + videos.length;
          let mediaHtml = "";

          if (totalMedia > 0) {
            const gridClass = "media-grid" + (totalMedia === 1 ? " single" : "");
            const items = [
              ...images.map(img => `
                <div class="media-item">
                  <img src="${escapeHtml(img.url)}"
                       alt="${escapeHtml(img.name)}"
                       onclick="openLightbox('${escapeHtml(img.url).replace(/'/g, "\\'")}')">
                </div>`),
              ...videos.map(vid => `
                <div class="media-item">
                  <video controls preload="metadata">
                    <source src="${escapeHtml(vid.url)}" type="${escapeHtml(vid.type || 'video/mp4')}">
                  </video>
                </div>`)
            ].join("");
            mediaHtml = `<div class="${gridClass}">${items}</div>`;
          }

          const contentHtml = formatContent(post.content);

          card.innerHTML = `
            <div class="card-header">
              ${avatarHtml}
              <div>
                <div class="post-title">${escapeHtml(post.title)}</div>
                <div class="meta">${escapeHtml(post.author)} · ${dateStr}</div>
              </div>
            </div>
            <div class="card-body">
              ${contentHtml ? `<div class="content">${contentHtml}</div>` : ""}
              ${mediaHtml}
            </div>
          `;

          container.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        if (loading) loading.remove();
        container.innerHTML = `<div class="error">Failed to load: ${escapeHtml(err.message)}</div>`;
      }
    }

    function formatContent(text) {
      if (!text) return "";
      const lines = text.split("\n");
      let html = "";
      let inList = false;

      for (const raw of lines) {
        const line = raw.trim();
        if (!line) {
          if (inList) { html += "</ul>"; inList = false; }
          continue;
        }
        if (line.startsWith("- ") || line.startsWith("• ")) {
          if (!inList) { html += "<ul>"; inList = true; }
          html += `<li>${escapeHtml(line.slice(2).trim())}</li>`;
          continue;
        }
        if (inList) { html += "</ul>"; inList = false; }
        if (line === line.toUpperCase() && line.length < 50 && /[A-Z]/.test(line)) {
          html += `<h3>${escapeHtml(line)}</h3>`;
          continue;
        }
        html += `<p>${escapeHtml(line)}</p>`;
      }

      if (inList) html += "</ul>";
      return html;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadDevlogs();
  </script>
</body>
</html>
