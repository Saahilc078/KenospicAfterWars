<script>
document.addEventListener("DOMContentLoaded", () => {

    const counters = document.querySelectorAll(".card-number");

    const observer = new IntersectionObserver((entries, observer) => {

        entries.forEach(entry => {

            if (!entry.isIntersecting) return;

            const counter = entry.target;
            const target = parseInt(counter.getAttribute("data-count"), 10);

            animateCount(counter, target);

            observer.unobserve(counter); // run only once
        });

    }, {
        threshold: 0.4
    });

    counters.forEach(counter => observer.observe(counter));

    function animateCount(counter, target) {

        const duration = 2500; // slower = more cinematic
        const startTime = performance.now();

        function update(currentTime) {

            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);

            // smooth ease-out (slow finish, fast start)
            const eased = 1 - Math.pow(1 - progress, 3);

            const value = Math.floor(eased * target);

            counter.textContent = value;

            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                counter.textContent = target;
            }
        }

        requestAnimationFrame(update);
    }

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const cards = document.querySelectorAll(".card");

    const observer = new IntersectionObserver((entries, observer) => {

        entries.forEach(entry => {

            if (!entry.isIntersecting) return;

            entry.target.classList.add("in-view");

            observer.unobserve(entry.target); // run once only
        });

    }, {
        threshold: 0.4
    });

    cards.forEach(card => observer.observe(card));

});
</script>
